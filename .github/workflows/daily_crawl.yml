name: Daily Crawling Automation

on:
  schedule:
    # 한국 시간 오후 9시 = UTC 낮 12시
    - cron: '0 12 * * *'
  workflow_dispatch: # Actions 탭에서 수동 실행 버튼 활성화

jobs:
  run-crawler:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Debug files
        run: |
          pwd
          ls -R
          echo "----- auto_crawl.py -----"
          sed -n '1,40p' Data_collect/auto_crawl.py
          echo "----- search json_load import -----"
          grep -R "json_load" -n AI_Employment_Support || true
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Data_collect/action_requirements.txt

      - name: Run Python Script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python Data_collect/auto_crawl.py
      
      - name: Upload crawling output artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: crawling-output-${{ github.run_number }}
          path: |
            run_outputs/
            data/total_site_link_final.json
            data/refined_data.json
            data/ocr_data.json
            data/LLM_data.json
          if-no-files-found: warn
          retention-days: 7
